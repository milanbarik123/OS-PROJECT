<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resource Hierarchy Simulator</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>

<body>

  <div class="container">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <div>
        <h1>Resource Hierarchy</h1>
        <p style="color: var(--text-muted);">Deadlock Prevention via Global Ordering</p>
      </div>
      <a href="index.html" class="btn">
        ← Back to Menu
      </a>
    </div>

    <div class="grid-layout">

      <!-- Sidebar -->
      <div class="sidebar">

        <div class="glass-panel">
          <h3>Controls</h3>
          <div class="control-group" style="margin-top: 1rem;">
            <label>Philosophers (N)</label>
            <div style="display: flex; gap: 0.5rem;">
              <input type="number" id="param-n" min="3" max="10" value="5">
              <button class="btn" onclick="applySettings()">Set</button>
            </div>
          </div>

          <div class="control-group" style="margin-top: 1rem;">
            <label>Speed</label>
            <input type="range" id="param-speed" min="100" max="2000" value="1000">
          </div>

          <div class="control-group" style="margin-top: 1rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
              <input type="checkbox" id="param-order" style="width: auto;">
              <span>Unsafe Order (High First)</span>
            </label>
            <div style="font-size: 0.7rem; color: var(--text-muted); line-height: 1.4;">
              <b>Unchecked:</b> Low → High (Safe)<br>
              <b>Checked:</b> High → Low (Risk of Deadlock)
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-top: 1.5rem;">
            <button id="btn-play" class="btn btn-primary" style="grid-column: span 2;" onclick="toggleAuto()">▶ Play
              Auto</button>
            <button class="btn" onclick="nextStep()">Step >></button>
            <button class="btn" onclick="reset()">Reset</button>
          </div>
        </div>

        <div class="glass-panel">
          <h3>Live Metrics</h3>
          <div style="margin-top: 1rem;">
            <div class="stat-row">
              <span>Total Meals</span>
              <span id="stat-meals" class="stat-value">0</span>
            </div>
            <div class="stat-row">
              <span>Max Wait Time</span>
              <span id="stat-wait" class="stat-value">0</span>
            </div>
            <div class="stat-row">
              <span>Fairness Index</span>
              <span id="stat-fairness" class="stat-value">1.00</span>
            </div>
          </div>
        </div>

        <!-- Analytics Panels -->
        <div class="glass-panel" style="height: 180px;">
          <canvas id="chart-wait"></canvas>
        </div>

        <div class="glass-panel" style="height: 180px;">
          <canvas id="chart-meals"></canvas>
        </div>

        <!-- Status Display -->
        <div class="glass-panel" style="margin-top:auto; padding:1rem; text-align:center;">
          <div
            style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.5rem;">
            Current Action</div>
          <div id="log-container"
            style="font-family:var(--font-mono); color:var(--text-main); font-size:1rem; min-height:1.5em; display:flex; align-items:center; justify-content:center;">
            System Ready
          </div>
        </div>

      </div>

      <!-- Visualization -->
      <div class="glass-panel visual-area">

        <div id="visual-table" class="table-surface"></div>

        <div class="legend glass-panel">
          <div style="font-weight: 600; margin-bottom: 0.5rem; color: var(--primary);">Legend</div>
          <div class="legend-item">
            <div class="dot" style="background:var(--text-muted)"></div> Thinking
          </div>
          <div class="legend-item">
            <div class="dot" style="background:var(--warning)"></div> Hungry
          </div>
          <div class="legend-item">
            <div class="dot" style="background:var(--success)"></div> Eating
          </div>
          <div style="height: 1px; background: var(--card-border); margin: 0.5rem 0;"></div>
          <div class="legend-item">
            <div class="dot" style="background:#374151; border: 1px solid var(--text-muted);"></div> Free Fork
          </div>
          <div class="legend-item">
            <div class="dot" style="background:#064e3b; border: 1px solid var(--success); box-shadow: 0 0 5px white;">
            </div> Held Fork
          </div>
        </div>

      </div>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="common.js?v=2"></script>
  <script src="analytics.js?v=2"></script>
  <script src="hierarchy.js?v=2"></script>

</body>

</html>
