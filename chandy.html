<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chandy–Misra Simulator</title>
  <link rel="stylesheet" href="style.css?v=3">
</head>

<body>

  <div class="container">
    <!-- Header -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
      <div>
        <h1>Chandy–Misra</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Distributed Deadlock Avoidance Logic</p>
      </div>
      <a href="index.html" class="btn">
        ← Back to Menu
      </a>
    </div>

    <div class="grid-layout">

      <!-- Sidebar -->
      <div class="sidebar">

        <!-- Usage Info -->
        <div class="glass-panel">
          <h3>Simulation Control</h3>

          <div class="control-group" style="margin-top: 1.5rem;">
            <label>Process Speed (ms)</label>
            <input type="range" id="param-speed" min="100" max="2000" value="1000"
              oninput="updateSpeedDisp(this.value)">
            <div style="text-align: right; font-size: 0.8rem; color: var(--accent);" id="speed-disp">1000ms</div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-top: 1.5rem;">
            <button id="btn-play" class="btn btn-primary" style="grid-column: span 2;" onclick="toggleAuto()">
              ▶ Start Simulation
            </button>
            <button class="btn" onclick="nextStep()">Step >></button>
            <button class="btn" onclick="reset()">Reset</button>
          </div>
        </div>

        <!-- Metrics -->
        <div class="glass-panel">
          <h3>System Metrics</h3>
          <div style="margin-top: 1rem;">
            <div class="stat-row">
              <span>Througput (Meals)</span>
              <span id="stat-meals" class="stat-value" style="color: var(--success)">0</span>
            </div>
            <div class="stat-row">
              <span>Fork Transfers</span>
              <span id="stat-moves" class="stat-value">0</span>
            </div>
            <div class="stat-row">
              <span>Max Wait Time</span>
              <span id="stat-wait" class="stat-value">0s</span>
            </div>
          </div>
        </div>

        <!-- Status Display (Replaces Log) -->
        <div class="glass-panel" style="margin-top:auto; padding:1rem; text-align:center;">
          <div
            style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:0.5rem;">
            Current Action</div>
          <div id="log-container"
            style="font-family:var(--font-mono); color:var(--text-main); font-size:1rem; min-height:1.5em; display:flex; align-items:center; justify-content:center;">
            System Ready
          </div>
        </div>

      </div>

      <!-- Visualization -->
      <div class="glass-panel visual-area">

        <!-- SVG Overlay for Graph -->
        <svg id="graph-canvas"></svg>

        <!-- Philosophers and Forks container -->
        <div id="visual-table" class="table-surface"></div>

        <!-- Legend -->
        <div class="legend glass-panel">
          <div style="font-weight: 700; margin-bottom: 0.8rem; color: var(--primary);">LEGEND</div>
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="dot" style="width:10px; height:10px; background:rgba(0,0,0,0.1); border-radius:50%"></div>
              <span>Thinking (Idle)</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="dot" style="width:10px; height:10px; background:var(--warning); border-radius:50%"></div>
              <span>Hungry (Requesting)</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="dot" style="width:10px; height:10px; background:var(--success); border-radius:50%"></div>
              <span>Eating (Active)</span>
            </div>
            <div style="height: 1px; background: rgba(0,0,0,0.1); margin: 4px 0;"></div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="dot"
                style="width:8px; height:8px; background:var(--success); border-radius:50%; border:1px solid rgba(0,0,0,0.2);">
              </div>
              <span>Clean Fork</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div class="dot"
                style="width:8px; height:8px; background:#9ca3af; border-radius:50%; border:1px solid rgba(0,0,0,0.2);">
              </div>
              <span>Dirty Fork</span>
            </div>
            <div style="height: 1px; background: rgba(0,0,0,0.1); margin: 4px 0;"></div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div style="width: 20px; height: 2px; background: var(--success);"></div>
              <span>Allocated</span>
            </div>
            <div style="display: flex; align-items: center; gap: 8px;">
              <div style="width: 20px; height: 2px; border-bottom: 2px dashed var(--warning);"></div>
              <span>Requesting</span>
            </div>
          </div>
        </div>

      </div>

    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="common.js?v=3"></script>
  <script src="analytics.js?v=3"></script>
  <script src="chandy.js?v=3"></script>

  <script>
    function updateSpeedDisp(val) {
      document.getElementById('speed-disp').innerText = val + "ms";
    }
  </script>

</body>

</html>
